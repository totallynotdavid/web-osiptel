[tools]
ruff = "0.14.5"

[tasks.install]
run = "uv sync --all-groups"

[tasks.update]
run = "uv sync -U --all-groups"

[tasks.outdated]
run = "uv pip list --outdated"

[tasks.format]
run = ["ruff format", "ruff check --fix"]

[tasks.check]
run = "uv run mypy ."

[tasks.dev]
run = "uv run uvicorn robot.main:app --host 0.0.0.0 --port 8001"
