name: web

on:
  workflow_dispatch:
  push:
    branches:
      - "master"
    paths:
      - "apps/web/**"
      - "package.json"
      - "bun.lock"
      - "oxlint.config.ts"
      - "oxfmt.config.ts"
      - ".github/workflows/web.yml"
  pull_request:
    branches:
      - "master"
    paths:
      - "apps/web/**"
      - "package.json"
      - "bun.lock"
      - "oxlint.config.ts"
      - "oxfmt.config.ts"
      - ".github/workflows/web.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  quality:
    name: quality
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"

      - name: install dependencies
        run: bun install --frozen-lockfile

      - name: format
        run: bun run format

      - name: lint
        run: bun run lint

      - name: type check
        run: bun run check:web

      - name: test
        run: bun run test
