name: web / test

on:
  workflow_dispatch:
  push:
    branches: [master]
    paths:
      - "apps/web/**"
      - "package.json"
      - "bun.lock"
      - ".github/workflows/web-test.yml"
  pull_request:
    branches: [master]
    paths:
      - "apps/web/**"
      - "package.json"
      - "bun.lock"
      - ".github/workflows/web-test.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    name: test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: vulf_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"

      - name: install dependencies
        run: bun install --frozen-lockfile

      - name: test
        run: bun run test
        env:
          TEST_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/vulf_test
